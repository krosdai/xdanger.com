version: 2
updates:
  # Keep SHA-pinned GitHub Actions current; opens PRs that bump both the pin
  # and the trailing `# vX.Y.Z` comment.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "🔧 chore(ci)"
    assignees:
      - xdanger
